<!DOCTYPE html>
<html>
<head>
  <title>HTML Table Example</title>
</head>
<body>

  <h2>Student Marks Table</h2>

  <table border="2" cellspacing="5" cellpadding="10">
    <tr>
      <th rowspan="2">Name</th>
      <th colspan="3">Marks</th>
    </tr>
    <tr>
      <th>Math</th>
      <th>Science</th>
      <th>English</th>
    </tr>
    <tr>
      <td>pallavi</td>
      <td>85</td>
      <td>90</td>
      <td>88</td>
    </tr>
    <tr>
      <td>radhika</td>
      <td>92</td>
      <td>89</td>
      <td>95</td>
    </tr>
    <tr>
      <td>priyanka</td>
      <td>78</td>
      <td>84</td>
      <td>80</td>
    </tr>
  </table>

</body>
</html>
